name: ecommerce_app
description: "Aplikasi E-Commerce Flutter - UAS Praktikum Pemrograman Mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifikasi Lokal (Soal 5)
  flutter_local_notifications: ^17.2.3

  # UI & Utilities
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true